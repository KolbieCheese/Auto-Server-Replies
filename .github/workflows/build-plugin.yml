name: Build Plugin

on:
  push:
    branches:
      - '**'
    paths:
      - 'src/**'
      - 'build.gradle.kts'
      - 'gradle.properties'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/build-plugin.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'build.gradle.kts'
      - 'gradle.properties'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/build-plugin.yml'
  workflow_dispatch:

concurrency:
  group: build-plugin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build plugin
        run: ./gradlew build

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: snarkyserver-plugin
          path: build/libs/snarkyserver-*.jar
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || github.token }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Determine release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          configured_version="$(grep '^version=' gradle.properties | cut -d= -f2)"
          if [[ ! "$configured_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Configured version must use MAJOR.MINOR.PATCH format, found: $configured_version" >&2
            exit 1
          fi

          existing_tag="$(git tag --points-at "$GITHUB_SHA" | grep '^v' | sort -V | tail -n 1 || true)"
          if [[ -n "$existing_tag" ]]; then
            release_version="${existing_tag#v}"
          else
            latest_tag="$(git tag --list 'v*' | sort -V | tail -n 1 || true)"
            latest_version="${latest_tag#v}"

            if [[ -z "$latest_version" ]]; then
              release_version="$configured_version"
            else
              if [[ ! "$latest_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                echo "Latest release tag must use vMAJOR.MINOR.PATCH format, found: $latest_tag" >&2
                exit 1
              fi

              highest_version="$(printf '%s\n%s\n' "$configured_version" "$latest_version" | sort -V | tail -n 1)"
              if [[ "$highest_version" == "$configured_version" && "$configured_version" != "$latest_version" ]]; then
                release_version="$configured_version"
              else
                IFS='.' read -r major minor patch <<< "$latest_version"
                release_version="${major}.${minor}.$((patch + 1))"
              fi
            fi
          fi

          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$release_version" >> "$GITHUB_OUTPUT"

      - name: Build release jar
        run: ./gradlew clean build -Pversion=${{ steps.version.outputs.release_version }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: ${{ steps.version.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: build/libs/snarkyserver-*.jar
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || github.token }}
