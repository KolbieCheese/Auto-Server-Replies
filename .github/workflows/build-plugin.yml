name: Build Plugin

on:
  push:
    paths:
      - 'src/**'
      - 'build.gradle.kts'
      - 'gradle.properties'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/build-plugin.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'build.gradle.kts'
      - 'gradle.properties'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/build-plugin.yml'
  workflow_dispatch:

concurrency:
  group: build-plugin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build plugin jar
    runs-on: ubuntu-latest
    outputs:
      plugin_version: ${{ steps.version.outputs.plugin_version }}
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Calculate plugin version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          base_version="$(grep '^pluginBaseVersion=' gradle.properties | cut -d= -f2)"
          IFS='.' read -r major minor patch <<< "$base_version"
          if ! [[ "$major" =~ ^[0-9]+$ && "$minor" =~ ^[0-9]+$ && "$patch" =~ ^[0-9]+$ ]]; then
            echo "Invalid pluginBaseVersion '$base_version'. Expected numeric major.minor.patch." >&2
            exit 1
          fi

          patch=$((patch + GITHUB_RUN_NUMBER))
          minor=$((minor + patch / 10))
          patch=$((patch % 10))
          major=$((major + minor / 10))
          minor=$((minor % 10))

          echo "plugin_version=${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

      # Build the Paper plugin jar on every push, pull request, and manual run.
      # Use bash explicitly so the build does not depend on gradlew file mode in git.
      - name: Build plugin
        run: bash ./gradlew --no-daemon --stacktrace clean build -PpluginVersion="${{ steps.version.outputs.plugin_version }}"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: SnarkyServer-${{ steps.version.outputs.plugin_version }}
          path: "build/libs/SnarkyServer-${{ steps.version.outputs.plugin_version }}.jar"
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.event_name == 'push'

    steps:
      - name: Download built jar
        uses: actions/download-artifact@v4
        with:
          name: SnarkyServer-${{ needs.build.outputs.plugin_version }}
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN || github.token }}
          tag_name: v${{ needs.build.outputs.plugin_version }}
          name: Snarky Server ${{ needs.build.outputs.plugin_version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: "release-assets/SnarkyServer-${{ needs.build.outputs.plugin_version }}.jar"
          fail_on_unmatched_files: true
          overwrite_files: true
