name: Build Plugin

on:
  push:
    paths:
      - 'src/**'
      - 'build.gradle.kts'
      - 'gradle.properties'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/build-plugin.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'build.gradle.kts'
      - 'gradle.properties'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/build-plugin.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: build-plugin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build plugin jar
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      # Build the Paper plugin jar on every push, pull request, and manual run.
      - name: Build plugin
        run: ./gradlew clean build

      # GitHub source zip/tarball downloads only contain source files.
      # Download the compiled plugin jar from this workflow run's artifact instead.
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: snarkyserver-plugin
          path: build/libs/snarkyserver-*.jar
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      # Use the version already declared by the Gradle project so release tags stay predictable.
      - name: Read release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version="$(grep '^version=' gradle.properties | cut -d= -f2)"
          if [[ -z "$version" ]]; then
            echo "Could not read version from gradle.properties" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      # Publish one release per Gradle version. Bump gradle.properties when you want a new release.
      - name: Check whether this version is already released
        id: release_state
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.version.outputs.tag }}"
          tag_sha="$(git ls-remote --tags origin "refs/tags/$tag" | cut -f1)"

          if [[ -z "$tag_sha" ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          elif [[ "$tag_sha" == "$GITHUB_SHA" ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Release $tag already points to this commit; republishing assets if needed."
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Release $tag already exists on a different commit; bump gradle.properties to publish a new version."
          fi

      # Reuse the exact jar produced by the build job so Releases and Actions artifacts match.
      - name: Download built jar
        if: steps.release_state.outputs.should_publish == 'true'
        uses: actions/download-artifact@v4
        with:
          name: snarkyserver-plugin
          path: release-assets

      - name: Verify release asset
        if: steps.release_state.outputs.should_publish == 'true'
        shell: bash
        run: |
          set -euo pipefail
          compgen -G 'release-assets/snarkyserver-*.jar' > /dev/null

      # Default-branch builds publish the jar to GitHub Releases for easier long-term downloads.
      - name: Publish GitHub release
        if: steps.release_state.outputs.should_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN || github.token }}
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: release-assets/snarkyserver-*.jar
          fail_on_unmatched_files: true
