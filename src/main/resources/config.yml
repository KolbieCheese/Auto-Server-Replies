enabled: true
# MiniMessage prefix for server follow-up replies.
prefix: "<gray>[<light_purple>Snark<gray>] <reset>"

death-snark:
  enabled: true
  # Per-category chances from 0.0 to 1.0.
  chances:
    generic: 0.20
    lava: 0.20
    fall: 0.20
    pvp: 0.20
    drowning: 0.20
    fire: 0.20
    void: 0.20
  # Legacy fallback for older configs.
  # chance: 0.20

chat-snark:
  enabled: true
  # Per-category chances from 0.0 to 1.0.
  chances:
    generic: 0.05
    question: 0.05
    excited: 0.05
    greeting: 0.05
  # Legacy fallback for older configs.
  # chance: 0.05
  min-message-length: 6
  ignore-commands: true

cooldowns:
  per-player-seconds: 120
  global-seconds: 20

filters:
  bypass-permission: "snarkyserver.bypass"
  ignored-worlds: []
  ignored-prefixes:
    - "!"
    - "?"

messages:
  # Death categories
  death-generic:
    - "{player} has departed this realm in a very normal way."
    - "Another flawless strategy from {player}."

  death-lava:
    - "{player} discovered that lava is, in fact, hot."

  death-fall:
    - "{player} tested gravity again. Results were consistent."

  death-pvp:
    - "{player} got outplayed by {killer}."

  death-drowning:
    - "{player} ran out of breathing privileges."

  death-fire:
    - "{player} is currently losing an argument with fire."

  death-void:
    - "{player} fell into the void and did not win."

  # Chat categories
  chat-generic:
    - "{player} said: {message}"
    - "Thanks for sharing that, {player}: {message}"

  chat-question:
    - "The server has noted {player}'s question: {message}"

  chat-excited:
    - "{player} brought maximum energy: {message}"

  chat-greeting:
    - "The server acknowledges {player}'s arrival: {message}"
