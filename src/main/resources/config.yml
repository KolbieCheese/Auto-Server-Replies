enabled: true
# Prefix now uses MiniMessage tags (legacy &-codes are not parsed).
prefix: "<gray>[<light_purple>Snark<gray>] <reset>"

death-snark:
  enabled: true
  # Per-category chance to post a death snark message.
  # Values are 0.0 to 1.0 (for example, 0.20 = 20%).
  chances:
    generic: 0.20
    lava: 0.20
    fall: 0.20
    pvp: 0.20
  # Legacy key kept for backward compatibility with older config files.
  # chance: 0.20

chat-snark:
  enabled: true
  # Per-category chance to post a chat snark message.
  # Values are 0.0 to 1.0 (for example, 0.05 = 5%).
  chances:
    generic: 0.05
  # Legacy key kept for backward compatibility with older config files.
  # chance: 0.05
  min-message-length: 6
  ignore-commands: true

cooldowns:
  per-player-seconds: 120
  global-seconds: 20

filters:
  bypass-permission: "snarkyserver.bypass"
  ignored-worlds: []
  ignored-prefixes:
    - "!"
    - "?"

messages:
  death-generic:
    - "{player} has departed this realm in a very normal way."
    - "Another flawless strategy from {player}."
  death-lava:
    - "{player} discovered that lava is, in fact, hot."
  death-fall:
    - "{player} tested gravity again. Results were consistent."
  death-pvp:
    - "{player} got outplayed by {killer}."
  chat-generic:
    - "{player} said: {message}"
    - "Thanks for sharing that, {player}: {message}"
