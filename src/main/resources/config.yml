enabled: true
prefix: "<white>[Server] <reset>"

death-snark:
  enabled: true
  # Per-category chances from 0.0 to 1.0.
  chances:
    generic: 0.20
    lava: 0.20
    fall: 0.20
    pvp: 0.20
    drowning: 0.20
    fire: 0.20
    void: 0.20
    explosion: 0.20
    suffocation: 0.20
    starvation: 0.20
    projectile: 0.20
    freezing: 0.20
  # Legacy fallback for older configs.
  # chance: 0.20

chat-snark:
  enabled: true
  # Per-category chances from 0.0 to 1.0.
  chances:
    generic: 0.20
    question: 0.15
    excited: 0.60
    greeting: 0.25
    lag: 0.10
    brag: 0.30
    confusion: 0.10
    spam: 0.30
    celebration: 0.10
  # Legacy fallback for older configs.
  # chance: 0.05
  min-message-length: 6
  ignore-commands: true
  spam-burst:
    threshold: 3
    window-seconds: 8
    max-message-length: 12

cooldowns:
  per-player-seconds: 120
  global-seconds: 20

filters:
  bypass-permission: "snarkyserver.bypass"
  ignored-worlds: []
  ignored-prefixes:
    - "!"
    - "?"

messages:
  # How to write custom messages:
  # - Each list item is one possible reply; Snarky picks one at random.
  # - Missing category lists fall back to death-generic or chat-generic.
  # - If a generic list is empty too, Snarky has nothing to send for that reply family.
  # - Placeholders are optional and can be used in any message.
  # - {player} = the triggering player's name.
  # - {message} = the original chat message for chat replies, otherwise blank.
  # - {killer} = the killer's name for visible PVP deaths, otherwise blank.
  # - MiniMessage formatting is supported in any message.
  # - Quote messages when YAML punctuation like :, ?, #, or leading/trailing spaces could be misread.
  death-generic:
    - "{player} really dumb*ss"
    - "Can you at least try, {player}."
    - "{player} vs reality: reality wins again."
    - "Rest in pieces, {player}."
    - "{player} has left the realm of competence."

  death-lava:
    - "{player} didn't feel good did it?"
    - "{player} you would be this dumb"
    - "This is why your dad left {player}"

  death-fall:
    - "{player} don't do that"
    - "Gravity is a middleschool science dumb*ss"
    - "You never try do you {player}?"
    - "We all talked {player}, and we all hate you"

  death-pvp:
    - "{player} could you at least try"
    - "{killer}, {player} called you a little b*tch"
    - "This is why everyone hates you {killer}"
    - "You've gotta click to hit them back dumb*ss"
    - "You're both b*tches, {player} & {killer}"
    - "Your mom drank while she was pregnant huh, {player}"
    - "{killer} did what your parents never had the courage to do"

  death-drowning:
    - "{player} don't swallow the water you f*ckin dumb*ss"
    - "Literally just swim up {player}"

  death-fire:
    - "{player} stop, drop, and roll idiot"
    - "Are you all this dumb?"
    - "{player} really leaned into the fire."

  death-void:
    - "{player} literally just don't fall"
    - "Professional idiot overhere"
    - "{player} is a problem"

  death-explosion:
    - "{player} don't do that"
    - "Living isn't for everyone ig"
    - "Next time try not to be there {player}"

  death-suffocation:
    - "{player} walls are not breathable"
    - "Are we even trying anymore?"
    - "{player} can't even breath right"

  death-starvation:
    - "{player} surpising considering your eating habits"
    - "I didn't know eating was optional for {player}."
    - "{player} you're a loser"

  death-projectile:
    - "{player} just move dumb*ss"
    - "What a wast of an projectile {killer}"
    - "{player} just try for once holy sh*t"

  death-freezing:
    - "{player} try not doing that"
    - "Literally just dig out of it {player}"

  chat-generic:
    - "That sounded better in your head, {player}"
    - "No one asked, {player}"
    - "We all talk about you when you're offline {player}"
    - "We’re all slightly worse off after reading that, {player}."
    - "They just let anyone join huh"
    - "We'd be better off without {player}"
    - "It'd be so nice if you just stfu"

  chat-question:
    - "Great question, {player}. Shame nobody asked"
    - "Have you tried figuring it out, {player}?"
    - "You always ask the dumbest sh*t"
    - "School's not for everyone ig"
    - "stfu"
    - "Nobody cares {player}"

  chat-excited:
    - "Calm down, {player}. It’s not that serious"
    - "We get it, {player}, now get a job"
    - "No one cares"
    - "Keep it to yourself {player}"
    - "Stfu"

  chat-greeting:
    - "{player}'s here, parties ruined"
    - "{player} get a job you bum"
    - "Oh great, it’s {player}."
    - "yea, {player} is a little... Oh, hey. You're here"
    - "It's called a job {player}"

  chat-lag:
    - "{player} it's probably your mid *ss build"
    - "Sounds like a you problem"
    - "K y s {player}"

  chat-brag:
    - "Please, {player}, /suicide"
    - "You're not him {player}"
    - "{player} this is why your parents got divorced"
    - "{player} your mom should've take you like a shot"
    - "Your mom doesn't love you does she {player}?"

  chat-confusion:
    - "{player} doesn't understand anything"
    - "There's /kit guide for a reason, {player}"
    - "This is why we all talk about you {player}"
    - "Sounds like a you problem, {player}."

  chat-spam:
    - "{player} please stfu"
    - "Maybe at least say something interesting, {player}."
    - "{player} no one cares"
    - "We all talked, and, we all hate you {player}."
    - "/suicide yourself or stop talking {player}"

  chat-celebration:
    - "There it is, {player}. A rare moment of competence"
    - "Congratulations, {player}. You might get a job some day"
    - "Enjoy the victory, {player}. You're normally not the brightest"
    - "Remarkable. Something worked for {player}."
