name: SnarkyServer
version: 1.0.0
main: com.beautyinblocks.snarkyserver.SnarkyServerPlugin
api-version: '1.21.11'
author: Beauty in Blocks
description: Lightweight snarky chat/death responder plugin (compatible with Paper 1.21.11 API)
commands:
  snarkreload:
    description: Reload SnarkyServer configuration.
    usage: /<command>
    aliases: [autoreplies]
    permission: snarkyserver.reload
permissions:
  snarkyserver.bypass:
    description: Prevent this player from triggering SnarkyServer replies.
    default: op
  snarkyserver.reload:
    description: Reload the SnarkyServer configuration from disk.
    default: op
