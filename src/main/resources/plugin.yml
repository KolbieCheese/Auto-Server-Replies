name: SnarkyServer
version: ${version}
main: com.beautyinblocks.snarkyserver.SnarkyServerPlugin
api-version: '1.21.11'
author: Beauty in Blocks
description: Lightweight snarky chat/death responder plugin for Paper 1.21.11
commands:
  snarkreload:
    description: Reload SnarkyServer configuration.
    usage: /<command>
    aliases: [autoreplies]
    permission: snarkyserver.reload
  snarktest:
    description: Force SnarkyServer test replies and inspect categories or cooldowns.
    usage: /<command> <list|death|chat|random|cooldowns>
    permission: snarkyserver.test
permissions:
  snarkyserver.bypass:
    description: Prevent this player from triggering automatic SnarkyServer replies.
    default: op
  snarkyserver.reload:
    description: Reload the SnarkyServer configuration from disk.
    default: op
  snarkyserver.test:
    description: Use admin testing commands for SnarkyServer replies.
    default: op
