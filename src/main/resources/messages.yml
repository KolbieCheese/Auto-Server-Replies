  chat-generic:
    - 'That sounded better in your head, {player}'
    - 'No one asked, {player}'
    - 'We all talk about you when you''re offline {player}'
    - 'We''re all slightly worse off after reading that, {player}'
    - 'They just let anyone join huh'
    - 'We''d be better off without {player}'
    - 'It''d be so nice if you just stfu'

  chat-question:
    - 'Great question, {player}. Shame nobody asked'
    - 'Have you tried figuring it out, {player}?'
    - 'You always ask the dumbest sh*t'
    - 'School''s not for everyone ig'
    - 'stfu'
    - 'Nobody cares {player}'

  chat-excited:
    - 'Calm down, {player}. It''s not that serious'
    - 'We get it, {player}, now get a job'
    - 'No one cares'
    - 'Keep it to yourself {player}'
