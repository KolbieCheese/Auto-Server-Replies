  chat-greeting:
    - '{player}''s here, parties ruined'
    - '{player} get a job you bum'
    - 'Oh great, it''s {player}'
    - 'yea, {player} is a little... Oh, hey. You''re here'
    - 'It''s called a job {player}'

  chat-lag:
    - '{player} it''s probably your mid *ss build'
    - 'Sounds like a you problem'
    - 'K y s {player}'

  chat-brag:
    - 'Please, {player}, /suicide'
    - 'You''re not him {player}'
    - '{player} this is why your parents got divorced'
    - '{player} your mom should''ve take you like a shot'
    - 'Your mom doesn''t love you does she {player}?'

  chat-confusion:
