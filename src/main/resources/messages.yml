# How to write custom messages:
# - Each list item is one possible reply; Snarky picks one at random.
# - Missing category lists fall back to death-generic or chat-generic.
# - If a generic list is empty too, Snarky has nothing to send for that reply family.
# - Placeholders are optional and can be used in any message.
# - {player} = the triggering player's name.
# - {message} = the original chat message for chat replies, otherwise blank.
# - {killer} = the killer's name for visible PVP deaths, otherwise blank.
# - MiniMessage formatting is supported in any message.
# - Quote messages when YAML punctuation like :, ?, #, or leading/trailing spaces could be misread.

messages:
  death-void:
    - '{player} walked into the void like an idiot'
    - 'The void saw {player} coming and won'
    - '{player} really looked at nothing and lost'
    - 'That takes a special kind of stupid, {player}'
    - '{player} fell into the giant empty hole'
    - 'Maybe watch where you''re going for once, {player}'

  death-generic:
    - '{player} died like a dumb*ass'
    - 'That was embarrassing, {player}'
    - '{player} stays losing'
    - 'You make this look hard, {player}'
    - '{player} died doing something stupid again'
    - 'Not a serious player, {player}'

  death-lava:
    - '{player} got in lava on purpose apparently'
    - 'Lava was the smarter one in that interaction'
    - '{player} saw lava and still lost'
    - 'That was hard to watch, {player}'
    - '{player} cooked themselves'
    - 'Somehow lava keeps outplaying {player}'

  death-fall:
    - 'Gravity is a middleschool science lesson, dumb*ass'
    - '{player} lost to the ground again'
    - 'Try landing better next time, {player}'
    - '{player} dropped in like they had a plan'
    - 'The floor remains undefeated'
    - '{player} with another stupid death'

  death-pvp:
    - '{killer} put {player} in the dirt'
    - '{player} got folded by {killer}'
    - '{killer} made that look easy'
    - '{player} lost that fight immediately'
    - '{killer} sent {player} back where they belong'
    - 'One of you had to win. Bad news, {player}'
    - '{player} got worked by {killer}'
    - '{killer} was barely trying'

  death-drowning:
    - '{player} drowned like a moron'
    - 'Water continues to confuse {player}'
    - '{player} found a way to lose underwater'
    - 'Turns out you still need air, {player}'
    - '{player} died in water. Incredible'
    - 'Embarrassing death, even for {player}'

  death-fire:
    - '{player} stood in fire and hoped for the best'
    - 'Fire wins again, {player}'
    - '{player} burned up like an idiot'
    - 'That was completely avoidable, {player}'
    - '{player} and open flames are not a good mix'
    - 'Maybe quit walking into fire, {player}'

  death-explosion:
    - '{player} got blown apart'
    - 'Explosions and {player} remain a bad combo'
    - '{player} stood too close like a dumb*ass'
    - 'That was never ending well for {player}'
    - '{player} turned into a crater'
    - 'You really stayed there and died, {player}'

  death-suffocation:
    - '{player} got stuck and died. Nice'
    - 'Walls are winning fights against {player}'
    - '{player} forgot blocks are solid'
    - 'You''d think breathing would be simple'
    - '{player} died in a wall like a clown'
    - 'That is a rough way to be stupid, {player}'

  death-starvation:
    - '{player} starved to death somehow'
    - 'Food was apparently too complicated for {player}'
    - '{player} really forgot to eat'
    - 'That is an insane way to die, {player}'
    - '{player} lost to hunger'
    - 'Hopeless behavior from {player}'

  death-projectile:
    - '{player} got hit because moving was too much work'
    - '{killer} landed one shot and that was enough'
    - '{player} stood there and took it'
    - 'Dodging was never really your thing, {player}'
    - '{player} made a great target'
    - '{killer} barely had to aim'

  death-freezing:
    - '{player} froze to death like a dumb*ass'
    - 'Cold weather completely shut down {player}'
    - '{player} got folded by snow'
    - 'You lost to being cold, {player}'
    - '{player} turned into a corpse-sicle'
    - 'That is a weak death even for {player}'

  chat-generic:
    - 'That sounded stupid, {player}'
    - 'Nobody needed that, {player}'
    - 'We were all better off before you said that'
    - 'They just let anyone join huh'
    - 'It''d be nice if you stfu sometimes'
    - '{player} typing like it''s their first day alive'
    - 'You should''ve kept that one to yourself, {player}'
    - 'Chat got worse instantly'

  chat-question:
    - 'Great question. Shut up'
    - 'Figure it out yourself, {player}'
    - 'You always ask dumb sh*t'
    - 'Use your eyes, {player}'
    - 'stfu'
    - 'Nobody cares {player}'
    - 'The answer was not worth asking for'
    - 'You could have just stayed confused'

  chat-excited:
    - 'Calm the hell down, {player}'
    - 'Nobody else is that excited'
    - 'Keep it to yourself'
    - 'You''re doing too much, {player}'
    - 'Stfu'
    - 'Act normal for five seconds'
    - 'You''re making this weird, {player}'
    - 'Bring it down several levels'

  chat-greeting:
    - '{player}''s here, party''s ruined'
    - 'Oh great, it''s {player}'
    - 'Look who showed up'
    - 'The server just got worse'
    - '{player} joined and the mood dropped instantly'
    - 'Unfortunate timing, {player}'
    - 'We were doing fine before {player}'
    - 'There goes the peace'

  chat-lag:
    - '{player} it''s probably your trash setup'
    - 'Sounds like your problem'
    - 'Fix your internet, {player}'
    - 'Your PC is begging for mercy'
    - 'That''s not the server, that''s your junk'
    - 'Close a few tabs and try again, {player}'
    - 'You are the bottleneck'
    - 'Nothing is wrong except your machine'

  chat-brag:
    - 'Please shut up, {player}'
    - 'You''re not that guy'
    - 'Nobody is impressed'
    - 'Big talk for somebody mid'
    - 'You say a lot for someone this average'
    - '{player} really loves hearing themselves talk'
    - 'That ego is doing heavy lifting'
    - 'You have not earned this attitude'

  chat-confusion:
    - '{player} is confused again'
    - 'Read literally anything, {player}'
    - 'This is why nobody explains things to you'
    - 'Sounds like a you problem {player}'
    - '{player} stays lost'
    - 'Try paying attention for once'
    - 'Not understanding basic things is your brand'
    - '{player} needs everything spoon-fed'

  chat-spam:
    - '{player} please stfu'
    - 'Stop typing'
    - '{player} no one cares'
    - 'We all talked, and we all hate you {player}'
    - 'You have said enough'
    - '{player} the mute button is right there'
    - 'Every message makes it worse'
    - 'Give it a rest, {player}'

  chat-celebration:
    - 'There it is {player}, a rare moment of competence'
    - 'Congratulations, you finally did something right'
    - 'Enjoy it, {player}. It probably won''t happen twice'
    - 'Remarkable. {player} managed not to fail'
    - 'One good moment doesn''t fix the rest'
    - 'Don''t get cocky over the bare minimum'
    - 'Even you pulled it off, {player}'
    - 'That almost looked intentional'
