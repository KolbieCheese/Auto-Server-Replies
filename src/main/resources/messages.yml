# How to write custom messages:
# - Each list item is one possible reply; Snarky picks one at random.
# - Missing category lists fall back to death-generic or chat-generic.
# - If a generic list is empty too, Snarky has nothing to send for that reply family.
# - Placeholders are optional and can be used in any message.
# - {player} = the triggering player's name.
# - {message} = the original chat message for chat replies, otherwise blank.
# - {killer} = the killer's name for visible PVP deaths, otherwise blank.
# - MiniMessage formatting is supported in any message.
# - Quote messages when YAML punctuation like :, ?, #, or leading/trailing spaces could be misread.

messages:
  death-void:
    - '{player} literally just don''t fall'
    - 'Professional idiot overhere'
    - '{player} is a problem'

  death-generic:
    - '{player} really dumb*ss'

  death-lava:
    - 'This is why your dad left {player}'
    - '/suicide would''ve been quicker {player}'

  death-fall:
    - 'Gravity is a middleschool science dumb*ss'
    - 'We all talked {player}, and we all hate you'

  death-pvp:
    - '{killer}, {player} called you a little b*tch'
    - 'This is why everyone hates you {killer}'
    - 'You''ve gotta click to hit them back dumb*ss'
    - 'You''re both b*tches, {player} & {killer}'
    - 'Your mom drank while she was pregnant huh, {player}'
    - '{killer} did what your parents never had the courage to do'

  death-drowning:
    - '{player} don''t swallow the water you f*ckin dumb*ss'

  death-fire:
    - '{player} stop, drop, and roll idiot'

  death-explosion:
    - '{player} don''t do that'
    - 'Living isn''t for everyone ig'
    - 'Next time try not to be there {player}'

  death-suffocation:
